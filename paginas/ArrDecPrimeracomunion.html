<script>
  function enviarWhatsApp(modelo, imagenUrl) {
    const numero = "593992638356"; // Tu número sin el "+"
    
    // Si la imagen ya es un enlace completo, úsala tal cual
    const linkImagen = imagenUrl.startsWith("http") 
      ? imagenUrl 
      : window.location.origin + imagenUrl;

    // Mensaje con formato bonito para WhatsApp
    const mensaje = 
      `(✿◡‿◡) *Hola, estoy interesado en la ${modelo}.*\n` +
      `⚆_⚆ Puedes ver la imagen aquí:\n${linkImagen}`;

    // Crear el enlace de WhatsApp
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
    
    // Abrir WhatsApp en una nueva pestaña
    window.open(url, "_blank");
  }
</script>
