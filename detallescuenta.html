<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pagos - Mey Detalles</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="shortcut icon" href="assets/imgs/favicon_io/android-chrome-512x512.png" type="image/x-icon">
<style>

:root {
  --bg: #ffffff;
  --text: #000;
  --card: #f8f9fa;
  --primary: #ff4d6d;
}

/* 🌙 MODO OSCURO AUTOMÁTICO */
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #121212;
    --text: #ffffff;
    --card: #1e1e1e;
  }
}

.img_logo{
    width: 2em;
    height: 2em;
}

/* BASE */
body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
  font-family: 'Segoe UI', sans-serif;
}

/* CONTENEDOR */
.app-box {
  background: var(--card);
  border-radius: 25px;
  padding: 25px;
  transition: 0.3s;
}

/* BOTONES */
.bank-btn {
  border-radius: 20px;
  padding: 15px;
  border: none;
  background: var(--card);
  color: var(--text);
  transition: 0.3s;
}

.bank-btn.active {
  background: var(--primary);
  color: #fff;
  transform: scale(1.05);
}

/* TARJETA DINÁMICA */
.card-bank {
  margin-top: 20px;
  border-radius: 20px;
  padding: 20px;
  background: var(--primary);
  color: #fff;
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* BOTÓN QR */
.btn-qr {
  background: white;
  color: black;
  border-radius: 15px;
}

/* MODO OSCURO BOTÓN */
@media (prefers-color-scheme: dark) {
  .btn-qr {
    background: #333;
    color: #fff;
  }
}
</style>
</head>

<body>
<!-- NAVBAR SIMPLE -->
<nav class="navbar navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="./index.html"><img class="img_logo" src="./assets/imgs/logo mey.png" alt="Logo mey detalles">⬅ Volver a inicio</a>

  </div>
</nav>
<div class="container my-5">
  <div class="app-box">

    <h5 class="fw-bold">💳 Métodos de Pago</h5>
    <p class="text-muted">Selecciona tu banco</p>

    <!-- BOTONES -->
    <div class="row text-center">

      <div class="col-4">
        <button class="bank-btn w-100" onclick="selectBank(this,'deuna')">
          <img src="https://drive.google.com/thumbnail?id=1_Z67VwJHBA-LTioV-in31jnbiQlwEd1b&sz=w2000" width="60"><br>DeUna
        </button>
      </div>

      <div class="col-4">
        <button class="bank-btn w-100" onclick="selectBank(this,'pichincha')">
          <img src="https://drive.google.com/thumbnail?id=1qxBwiPtB4g6zODO7IZHGtGCJY3OhUGnR&sz=w2000" width="60"><br>Pichincha
        </button>
      </div>

      <div class="col-4">
        <button class="bank-btn w-100" onclick="selectBank(this,'riobamba')">
          <img src="https://drive.google.com/thumbnail?id=1Q9U65SeJEao4A5OL3MOQ29Tl8e0kGkI5&sz=w2000" width="60"><br>Riobamba Ltda.
        </button>
      </div>

    </div>

    <!-- INFO -->
    <div id="info"></div>

  </div>
</div>

<!-- MODAL QR -->
<div class="modal fade" id="qrModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-3">
      <h5>Escanea el QR</h5>
      <img id="qrImg" src="" class="img-fluid">
    </div>
  </div>
</div>

<script>

function selectBank(btn, banco){

  document.querySelectorAll('.bank-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let data = {
    deuna: {
      nombre:"DeUna",
      numero:"7700763452",
      tipo:"Cuenta Ahorros",
      ci:"0605585983",
      qr:"https://drive.google.com/thumbnail?id=1e321D6uSVBkoZeA0GT6kZbrSyZkgDjZa&sz=w2000",
      color:"#745fe2"
    },
    pichincha: {
      nombre:"Banco Pichincha",
      numero:"2201137965",
      tipo:"Cuenta Ahorros",
      ci:"0605585983",
      qr:"https://drive.google.com/thumbnail?id=12HhY4GArMvK_7VL5_L5Y9dWLV9F2NcB1&sz=w2000",
      color:"#c99a3f"
    },
    riobamba: {
      nombre:" Riobamba Ltda.",
      numero:"406xxxxx0341",
      tipo:"Cuenta Ahorros",
      ci:"0605585983",
      qr:"https://drive.google.com/thumbnail?id=10Xb_EdP7CX96v1ToRUPvZwuenFA6H3l6&sz=w2000",
      color:"#FFFFFF80"
    }
  };

  let d = data[banco];

//cambiamos colores 
  document.documentElement.style.setProperty('--primary', d.color);

  document.getElementById("info").innerHTML = `
    <div class="card-bank" style="color:${banco==='guayaquil'?'black':'white'}">
      <h5>${d.nombre}</h5>

      <button class="btn btn-qr w-100 my-2" onclick="verQR('${d.qr}')">
        Ver Código QR
      </button>

      <div class="mt-3">
        <b>Titular:</b><br>Melisa Yanza Bermeo<br><br>

        <b>Número:</b><br>
        ${d.numero}
        <span style="cursor:pointer" onclick="copiar('${d.numero}')">📋 copiar</span>
        <br><br>
        <b>Tipo:</b><br>
        ${d.tipo}<br><br>
        <b>Ruc/ci:</b><br>
        ${d.ci}
      </div>
    </div>
  `;
}

function verQR(img){
  document.getElementById("qrImg").src = img;
  let modal = new bootstrap.Modal(document.getElementById('qrModal'));
  modal.show();
}

function copiar(texto){
  navigator.clipboard.writeText(texto);
  alert("Número copiado ✔");
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
